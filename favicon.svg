<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Dark minimalist background -->
  <rect width="1920" height="1080" fill="#1e1e1e"/>
  
  <!-- Outer subtle glowing or tech border -->
  <rect x="20" y="20" width="1880" height="1040" rx="90" fill="none" stroke="#333333" stroke-width="8"/>
  
  <!-- Decorative terminal-like code elements in background (low opacity) -->
  <text x="50" y="100" font-family="Courier New, monospace" font-size="24" fill="#ffffff" opacity="0.07">&lt;section&gt;</text>
  <text x="70" y="140" font-family="Courier New, monospace" font-size="24" fill="#ffffff" opacity="0.07">const Hero = () =&gt; {</text>
  <text x="70" y="400" font-family="Courier New, monospace" font-size="24" fill="#ffffff" opacity="0.07">return &lt;div&gt;</text>
  <text x="50" y="440" font-family="Courier New, monospace" font-size="24" fill="#ffffff" opacity="0.07">&lt;/section&gt;</text>
  
  <!-- Main "RM" Typography -->
  <text x="50%" y="54%" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="210" 
        font-weight="800" 
        fill="#ffffff" 
        letter-spacing="-6"
        text-anchor="middle" 
        dominant-baseline="middle">RM</text>
</svg>
