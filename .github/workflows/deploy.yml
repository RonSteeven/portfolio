name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Unit tests (Jest) ──────────────────────────────────────────────────
      - name: Run unit tests
        run: npm test

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── E2E tests (Cypress against production build) ───────────────────────
      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          start: npm run preview -- --port 5173
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 30
          command: npm run cy:run:ci

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
